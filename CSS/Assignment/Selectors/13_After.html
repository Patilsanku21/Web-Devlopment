<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> After </title>
    <style>
        h1::after{
            content: "Hello";
            font-size: 30px;
            color: brown;

        }
        h2::after{
            content:"Good Morning";
            font-size: 30px;
            color: chartreuse;
        }
    </style>
</head>
<body>
    <h1> Lorem ipsum dolor sit amet.</h1>
    <h2>Lorem ipsum dolor sit amet.</h2>
    <h3> Lorem ipsum dolor sit amet.</h3>
</body>
</html>

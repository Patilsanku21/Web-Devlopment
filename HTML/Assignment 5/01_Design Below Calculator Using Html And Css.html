<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        .Card{
            text-align: center;
        }
        .cal{
            text-align: center;
            background-color: rgb(216, 198, 198);
            height: 500px;
            width: 500px;
        }
        .Box{
            background-color: green;
        }
        .red{
            background-color: rgb(212, 23, 23);
        }
    </style>
</head>
<body>
    <div class="Card" ></div>
   <table class="cal" border="1px" style="border-collapse:collaps;">
        <tr>
            <th colspan="6"> Calculator</th>
            <th colspan="6"> 0</th>
        </tr>
        <tr>
            <div>
            <td>Mod</td>
            <td colspan="2">Deg</td>
            <td colspan="2">rad</td>
            <td>MC</td>
            <td>MR</td>
            <td>MS</td>
            <td>M+</td>
            <td>M-</td>
            </div>
        </tr>

    <tr>
        <div>
        <td>sinh</td>
        <td>cosh</td>
        <td>tanh</td>
        <td>Exp</td>
        <td>(</td>
        <td>)</td>
        <td class="red" colspan="2">^</td>
        <td class="red">C</td>
        <td class="red">+/-</td>
        <td>$</td>
        </div>
    </tr>

    <tr>
        <div>
        <td>sinh-1</td>
        <td>cosh-1</td>
        <td>tanh-1</td>
        <td>log2X</td>
        <td>In</td>
        <td>Log</td>
        <td>7</td>
        <td>8</td>
        <td>9</td>
        <td>/</td>
        <td>%</td>
        </div>
    </tr>

    <tr>
        <div>
        <td>/</td>
        <td>e</td>
        <td>n!</td>
        <td>logxy</td>
        <td>ex</td>
        <td>10x</td>
        <td>4</td>
        <td>5</td>
        <td>6</td>
        <td>*</td>
        <td>1/X</td>
        </div>
    </tr>

    <tr>
        <div>
        <td>sin</td>
        <td>cos</td>
        <td>tan</td>
        <td>xy</td>
        <td>x3</td>
        <td>x2</td>
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>-</td>
        <td class="Box"rowspan="2">=</td>
        </div>
    </tr>

    <tr>
        <div>
        <td>sin-1</td>
        <td>cos-1</td>
        <td>tan-1</td>
        <td>y</td>
        <td>3</td>
        <td>|x|</td>
        <td>0</td>
        <td>.</td>
        <td rowspan="2">+</td>
        </div>
        
    </tr>
    </tabel>
    
</body>
</html>

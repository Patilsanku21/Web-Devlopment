        {
            color: blue;
            background-color:greenyellow;
        }

</head>

        <nav>
            <div>
                <a href="">Home</a>
            </div>
            <p>

            </p>

                <a href="">Contact</a>
            </pre>
            <h6>
                <a href="">Search</a>
            </h6>
        </nav>
    </header>
</body>
</html>

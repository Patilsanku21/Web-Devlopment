<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language</title>
    <style>
        p[lang|="en"]{
            color:burlywood;
        }
        p[lang|="fr"]{
            color: brown;
        }
    </style>
</head>
<body>
    <p lang="en">Lorem ipsum dolor sit.</p>
    <p lang="fr">Lorem ipsum dolor sit amet.</p>
    <p lang="en-us">Lorem ipsum dolor sit amet.</p>
</body>
</html>

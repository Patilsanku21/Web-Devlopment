<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Members</title>
    <style>
        button{
            color:white;
            background-color:lightpink;
            width: 100%;
            font-size: 20px;
        

        }
        button:hover{
            background-color:coral;
        }
        h1{
            text-align: center;
            color:brown;
            font-family: sans-serif;
        }
        body{
            background-color:cornsilk;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
        .Update{
            width: 400px;
            margin: 50px auto;
            padding: 40px;
            background-color:white;
            border-radius: 10px;
            border: 1px solid black;

        }
        label{
            font-weight: 500;
        }
        input,select,textarea{
            width: 100%;
            padding:10px;
            margin-top: 5px;
            margin-bottom: 10px;
        }
        input:focus ,textarea:focus{
            border:2px solid red;
            outline: darkseagreen;
        }


    </style>
</head>
<body>
    <div class="Update">
    <h1> Update Members</h1>

    <from action>
        <label for=""> Username:</label>
        <input type="text" placeholder="Enter Your Name"><br><br>

        <label for=""> Password:</label>
        <input type="password" placeholder="Enter Your Password"><br><br>

        <label for=""> Full Name:</label>
        <input type="Name" placeholder="Enter Your Name"><br><br>

        <label for=""> Email:</label>
        <input type="Email" placeholder="Enter Your Email"><br><br>

        <label for=""> Mobile No:</label>
        <input type="Number"placeholder="Enter Your Number"><br><br>

        <label for=""> Address:</label>
        <textarea value = "Address"cols = "20"Row ="4"></textarea><br><br>

        <button> Update</button>
        <button> Delete </button>
    </from>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>class Selector</title>
    <style>
        .unique{
            background-color: blueviolet;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
        .Multiple{
            background-color:orange;
            font-size: 50px;
        }
        
    </style>
</head>
<body>
    <h1>Class Selector</h1>
    <p class="Multiple unique">Lorem ipsum dolor sit amet consectetur adipisicing elit. </p>
    <pre class="Multiple unique">Lorem ipsum dolor sit, amet consectetur adipisicing elit.</pre>
    <h6 class="Multiple"> Lorem ipsum dolor sit amet.</h6>
</body>
</html>

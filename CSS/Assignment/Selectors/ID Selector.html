<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Selector</title>
    <style>
        h1{
            color:brown;
        }
        #First{
            color:blueviolet;
        }
        #Last{
            color:fuchsia;
        }
    </style>
</head>
<body>
    <h1 id="First">Hello</h1>
    <h1> World</h1>
    <h1 id="Last">Sunday</h1>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

    <title>Grouping Selector</title>
    <style>
        h1,span,pre,p{
            color:seagreen;
            font-size: 30px;
        }

</head>
<body>
    <h1> Lorem ipsum dolor sit amet.</h1>

    <p>Lorem ipsum dolor sit amet.</p>
</body>
</html>

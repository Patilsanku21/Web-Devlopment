<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>em</title>
    <style>
        .parent{
            font-size: 15px;
            border: 2px solid green;
        }
        .child{
            font-size: 1.5em;
            border: 2px solid pink;
        }
    </style>
</head>
<body>
 <div class="parent">Lorem ipsum dolor sit amet.</div>   
 <div class="child">Lorem ipsum dolor sit amet.</div>
</body>
</html>
